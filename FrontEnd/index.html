        /* --- Persistent side camera --- */
body.has-side-camera .jspsych-content {
  max-width: none;
  width: calc(100vw - 300px);
  margin-left: 300px;
  min-height: calc(100vh - 70px);
  padding: 40px 24px 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

body.has-side-camera .card,
body.has-side-camera .form-card,
body.has-side-camera .jspsych-survey-html-form,
body.has-side-camera .jspsych-survey-multi-choice-question {
  width: min(760px, 100%);
  margin: 0;
}

#webgazerVideoContainer {
  position: fixed !important;
  left: 20px !important;
  top: 110px !important;
  width: 240px !important;
  height: 180px !important;
  z-index: 99999 !important;
  border-radius: 16px !important;
  overflow: hidden !important;
  background: #fff !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 10px 28px rgba(0, 41, 87, 0.12) !important;
  display: block !important;
}

#webgazerVideoFeed,
#webgazerVideoCanvas,
#webgazerFaceOverlay {
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}

#webgazerFaceFeedbackBox,
#webgazerFaceOverlay {
  display: block !important;
}

#webgazerVideoFeed {
  object-fit: cover !important;
  transform: scaleX(-1);
}

#webgazerFaceFeedbackBox,
#webgazerGazeDot {
  z-index: 100000 !important;
}

/* --- Full-viewport calibration/validation without scroll --- */
body.calibration-phase,
body.validation-phase {
  overflow: hidden;
}

body.calibration-phase .jspsych-content,
body.validation-phase .jspsych-content {
  max-width: 100%;
  width: 100%;
  padding-left: 300px;
}

/* --- Custom calibration stage --- */
.calibration-stage {
  position: relative;
  width: 100%;
  height: 420px;
  margin-top: 18px;
  border: 1px dashed var(--border);
  border-radius: 18px;
  background: #fff;
  overflow: hidden;
}

.calibration-dot {
  position: absolute;
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 999px;
  background: var(--accent);
  transform: translate(-50%, -50%);
  opacity: 0.18;
  cursor: pointer;
  box-shadow: 0 0 0 8px rgba(241, 86, 63, 0.08);
  transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
}

.calibration-dot.done {
  background: var(--primary);
  opacity: 1;
  box-shadow: 0 0 0 10px rgba(0, 41, 87, 0.10);
}

@media (max-width: 900px) {
  body.has-side-camera .jspsych-content {
    width: 100%;
    margin-left: 0;
    min-height: auto;
    padding-left: 24px;
    padding-right: 24px;
    padding-top: 210px;
    display: block;
  }

  #webgazerVideoContainer {
    width: 180px !important;
    height: 135px !important;
    left: 16px !important;
    top: 92px !important;
  }

  body.calibration-phase .jspsych-content,
  body.validation-phase .jspsych-content {
    width: 100%;
    margin-left: 0;
    padding-left: 24px;
    padding-right: 24px;
    padding-top: 210px;
  }

  .calibration-stage {
    height: 340px;
  }
}

function safeFloat(value, defaultValue = 0) {

function averageArray(arr) {
  if (!Array.isArray(arr) || arr.length === 0) return null;
  const valid = arr.filter(v => typeof v === "number" && !Number.isNaN(v));
  if (valid.length === 0) return null;
  return Number((valid.reduce((a, b) => a + b, 0) / valid.length).toFixed(2));
}

    function summarizeTrialGaze(trial, selector, sampleMs = GAZE_SAMPLE_MS) {
      const samples = Array.isArray(trial?.webgazer_data) ? trial.webgazer_data : [];
      const targets = trial?.webgazer_targets || {};
      const target = targets[selector];

      if (!target) {
        return {
          total_samples: samples.length,
          in_target_samples: 0,
          on_target_ratio: null,
          first_fixation_latency_ms: null,
          dwell_time_ms: 0,
          region_width: null,
          region_height: null,
          points: []
        };
      }

      let inTarget = 0;
      let firstFixation = null;
      const points = [];

      for (const sample of samples) {
        const inside =
          sample.x >= target.left &&
          sample.x <= target.right &&
          sample.y >= target.top &&
          sample.y <= target.bottom;

        if (inside) {
          inTarget += 1;

          if (firstFixation === null) {
            firstFixation = sample.t ?? null;
          }

          points.push({
            rel_x: Number(((sample.x - target.left) / target.width).toFixed(4)),
            rel_y: Number(((sample.y - target.top) / target.height).toFixed(4))
          });
        }
      }

      return {
        total_samples: samples.length,
        in_target_samples: inTarget,
        on_target_ratio: samples.length ? Number((inTarget / samples.length).toFixed(2)) : null,
        first_fixation_latency_ms: firstFixation,
        dwell_time_ms: inTarget * sampleMs,
        region_width: target.width ?? null,
        region_height: target.height ?? null,
        points
      };
    }

    function buildPayload(allData) {
  const baselineTrial = allData.find(d => d.phase === "baseline");
  const task1QuestionTrial = [...allData].reverse().find(d => d.phase === "task1_question" && !d.backtrack_only);
  const task2QuestionTrial = [...allData].reverse().find(d => d.phase === "task2_question" && !d.backtrack_only);
  const task1ReadingTrial = [...allData].reverse().find(d => d.phase === "task1_reading");
  const task2InfoTrial = [...allData].reverse().find(d => d.phase === "task2_info");
  const task1Gaze = summarizeTrialGaze(task1ReadingTrial, "#task1-text-region");
  const task2Gaze = summarizeTrialGaze(task2InfoTrial, "#task2-info-region");

  return {
    participant_id: PARTICIPANT_ID,
    session_id: SESSION_ID,
    created_at: new Date().toISOString(),
    baseline: baselineTrial?.response || {},
    tasks: {
      task1: {
        answer: task1QuestionTrial?.user_answer || null,
        correct: task1QuestionTrial?.correct || 0,
        time_on_task_ms: task1QuestionTrial?.time_on_task_ms || null,
        question_time_ms: task1QuestionTrial?.question_time_ms || null,
        answer_changes: task1QuestionTrial?.answer_changes || 0,
        backtracking: task1QuestionTrial?.backtracking || 0,
        hesitation: task1QuestionTrial?.hesitation || 0,

      },
      task2: {
        answer: task2QuestionTrial?.user_answer || null,
        correct: task2QuestionTrial?.correct || 0,
        time_on_task_ms: task2QuestionTrial?.time_on_task_ms || null,
        question_time_ms: task2QuestionTrial?.question_time_ms || null,
        answer_changes: task2QuestionTrial?.answer_changes || 0,
        backtracking: task2QuestionTrial?.backtracking || 0,
        hesitation: task2QuestionTrial?.hesitation || 0,
        errors: task2QuestionTrial?.errors || 0
      }
    },
    gaze: {
      validation: null,
      task1_reading: {
        metrics: task1Gaze,
        raw_samples: task1ReadingTrial?.webgazer_data || []
      },
      task2_info: {
        metrics: task2Gaze,
        raw_samples: task2InfoTrial?.webgazer_data || []
      }
    },
    raw_trials: allData
  };

}

function readCameraDiagnostics() {
  const video =
    document.querySelector("#webgazerVideoFeed") ||
    document.querySelector("video");

  const stream = video?.srcObject;

  const stream_live =
    !!stream &&
    typeof stream.getTracks === "function" &&
    stream.getTracks().some(track => track.readyState === "live");

  const camera_ready =
    !!video &&
    video.videoWidth > 0 &&
    video.videoHeight > 0;

  return { camera_ready, stream_live };
}

function persistGazeDebugSnapshot() {
  const allData = jsPsych.data.get().values();

  const task1ReadingTrial = [...allData].reverse().find(d => d.phase === "task1_reading");
  const task2InfoTrial = [...allData].reverse().find(d => d.phase === "task2_info");

  const task1Summary = summarizeTrialGaze(task1ReadingTrial, "#task1-text-region");
  const task2Summary = summarizeTrialGaze(task2InfoTrial, "#task2-info-region");

  const diagnostics = readCameraDiagnostics();
  const predictionCount = (task1Summary.total_samples || 0) + (task2Summary.total_samples || 0);

  const snapshot = {
    lang: currentLang,
    camera_ready: diagnostics.camera_ready,
    stream_live: diagnostics.stream_live,
    prediction_count: predictionCount,
    validation: null,
    task1: {
      title: currentLang === "fi" ? "Tehtävän 1 tulos" : "Task 1 result",
      heatmapTitle: currentLang === "fi" ? "Tehtävän 1 lukualue" : "Task 1 reading region",
      summary: task1Summary,

    },

      title: currentLang === "fi" ? "Tehtävän 2 tulos" : "Task 2 result",
      heatmapTitle: currentLang === "fi" ? "Tehtävän 2 tietoalue" : "Task 2 information region",
      summary: task2Summary,
      raw_samples: task2InfoTrial?.webgazer_data || []
    }
  };

  localStorage.setItem("latest_gaze_debug", JSON.stringify(snapshot));
}
    async function saveExperimentData(payload) {
      const response = await fetch(`${API_BASE_URL}/api/experiment`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const responseText = await response.text();

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${responseText}`);
      }

      try {
        return JSON.parse(responseText);
      } catch {
        return { raw: responseText };
      }
    }

        ${CUSTOM_CALIBRATION_POINTS.map((p, i) => `
          <button
            type="button"
            class="calibration-dot"
            data-index="${i}"
            data-x="${p.x}"
            data-y="${p.y}"
            style="left:${p.x}%; top:${p.y}%"
            aria-label="Calibration point ${i + 1}">
          </button>
        `).join("")}
      </div>

      <p id="calibration-status" class="small-note">Calibration progress: 0 / 45</p>
    </div>
  `,
  choices: [s("continue_btn")],
  data: { phase: "calibration" },
  on_load: function() {
    setPhaseBodyClass("calibration-phase");
    showSideCamera(false);

    try {
      jsPsych.extensions.webgazer.resetCalibration();
    } catch (e) {}

    const continueButton = document.getElementById("jspsych-html-button-response-button-0");
    const statusEl = document.getElementById("calibration-status");
    const totalRequiredClicks = CUSTOM_CALIBRATION_POINTS.length * 5;

    if (continueButton) {
      continueButton.disabled = true;
      continueButton.style.opacity = "0.6";
      continueButton.style.cursor = "not-allowed";
    }

    let totalClicks = 0;

    document.querySelectorAll(".calibration-dot").forEach((dot) => {
      let pointClicks = 0;

      dot.addEventListener("click", () => {
        if (pointClicks >= 5) return;

        pointClicks += 1;
        totalClicks += 1;

        const rect = dot.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        try {
          jsPsych.extensions.webgazer.calibratePoint(x, y);
        } catch (e) {}

        dot.style.opacity = String(Math.min(1, 0.18 + pointClicks * 0.16));
        dot.style.transform = `translate(-50%, -50%) scale(${1 + pointClicks * 0.03})`;

        if (pointClicks === 5) {
          dot.classList.add("done");
          dot.disabled = true;
        }

        if (statusEl) {
          statusEl.textContent = `Calibration progress: ${totalClicks} / ${totalRequiredClicks}`;
        }

        if (totalClicks >= totalRequiredClicks && continueButton) {
          continueButton.disabled = false;
          continueButton.style.opacity = "1";
          continueButton.style.cursor = "pointer";
        }
      });
    });
  },
  on_finish: function() {
  setPhaseBodyClass("");
  try {
    jsPsych.extensions.webgazer.startMouseCalibration();
  } catch (e) {}
}
};
